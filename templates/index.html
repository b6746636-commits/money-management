<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบส่งสลิปชำระเงิน - Liquor Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8fafc; /* เปลี่ยนเป็นสีขาวนวลแบบ Slate 50 */
            --card-bg: #ffffff; /* กล่องฟอร์มสีขาวบริสุทธิ์ */
            --primary-color: #3182ce; /* สีน้ำเงินสว่างสไตล์มินิมอล */
            --primary-hover: #2b6cb0;
            --text-main: #1a202c; /* ตัวหนังสือหลักสีเทาเข้มเกือบดำ อ่านง่ายมาก */
            --text-muted: #718096; /* ตัวหนังสือรองสีเทา */
            --border-color: #e2e8f0; /* สีเส้นขอบอ่อนๆ */
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(49, 130, 206, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(49, 130, 206, 0.02) 0px, transparent 50%);
            font-family: 'Anuphan', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* เอฟเฟกต์ Fade-in ตอนโหลดหน้าเว็บครั้งแรก */
        .main-container {
            animation: fadeIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            max-width: 520px;
            width: 100%;
            padding: 20px;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* เปลี่ยนจากกระจกฝ้ามืด เป็นกล่องขาวคลีนที่มีเงาละมุน (Soft Shadow) */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 
                        0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .title-brand {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-color);
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ตกแต่ง Input และ Select */
        .form-label {
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-control, .form-select {
            background-color: #ffffff !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-main) !important;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.15) !important;
        }

        .form-select option {
            background-color: #ffffff;
            color: var(--text-main);
        }

        /* ปรับแต่ง Dropzone หรือ Input File ให้ดูล้ำ */
        .file-input-wrapper {
            position: relative;
            cursor: pointer;
        }

        /* ปุ่มส่งข้อมูลแบบน้ำเงินคลีนสุภาพ */
        .btn-cyber {
            background: var(--primary-color);
            border: none;
            color: #ffffff;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2);
        }

        .btn-cyber:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(49, 130, 206, 0.3);
            color: #fff;
        }

        .btn-cyber:active {
            transform: translateY(1px);
        }

        /* แฟลชเมสเซจสไตล์การแจ้งเตือนระบบ */
        .alert {
            border-radius: 14px;
            border: none;
            font-weight: 600;
        }
        .alert-success {
            background-color: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }
        .alert-danger {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        /* ลิงก์ไปหน้า Admin ด้านล่าง */
        .admin-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .admin-link:hover {
            color: var(--primary-color);
        }
    </style>

<div class="main-container">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} text-center mb-3 shadow-sm" role="alert">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="glass-card">
        <div class="text-center mb-4">
            <div class="mb-2">
                <i class="fa-solid fa-wine-glass-fluid fa-3x" style="color: var(--neon-blue); filter: drop-shadow(0 0 8px rgba(0,242,254,0.4));"></i>
            </div>
            <h2 class="h4 mb-1 fw-bold">ส่งข้อมูลสลิป</h2>
            <p class="text-muted small title-brand">By.TuNvA</p>
        </div>

        <form action="{{ url_for('index') }}" method="POST" enctype="multipart/form-data">
            
            <div class="mb-4">
                <label for="name" class="form-label">
                    <i class="fa-regular fa-user me-2 text-info"></i>เลือกชื่อของคุณ
                </label>
                <select class="form-select" id="name" name="name" required>
                    <option value="" disabled selected>-- กรุณาเลือกชื่อจากระบบ --</option>
                    {% for allowed_name in allowed_names %}
                        <option value="{{ allowed_name }}">{{ allowed_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label for="amount" class="form-label">
                    <i class="fa-solid fa-baht-sign me-2 text-info"></i>จำนวนเงิน (บาท)
                </label>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="ระบุยอดโอนตามจริง เช่น 350" required>
            </div>

            <div class="mb-4">
                <label for="slip" class="form-label">
                    <i class="fa-regular fa-image me-2 text-info"></i>แนบภาพสลิปเงินโอน
                </label>
                <div class="file-input-wrapper">
                    <input type="file" class="form-control" id="slip" name="slip" accept="image/*" required>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber w-100 mt-2 py-3">
                <i class="fa-solid fa-paper-plane me-2"></i>ส่งข้อมูลชำระเงิน
            </button>

        </form>

        <div class="text-center mt-4 pt-2 border-top border-secondary border-opacity-25">
            <a href="{{ url_for('admin_panel') }}" class="admin-link">
                <i class="fa-solid fa-lock"></i> สำหรับผู้ดูแลระบบ (Admin)
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
